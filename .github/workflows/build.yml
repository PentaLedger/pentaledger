name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang]
        exclude:
          - os: windows-latest
            compiler: clang
        include:
          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            arch: x64
          - os: ubuntu-latest
            compiler: gcc
            generator: "Unix Makefiles"
            arch: x64
          - os: ubuntu-latest
            compiler: clang
            generator: "Unix Makefiles"
            arch: x64
          - os: macos-latest
            compiler: gcc
            generator: "Unix Makefiles"
            arch: x64
          - os: macos-latest
            compiler: clang
            generator: "Unix Makefiles"
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build

    - name: Install Dependencies
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install cmake ninja

    - name: Install Dependencies
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake ninja

    - name: Set up compiler
      if: matrix.compiler == 'gcc' && matrix.os != 'windows-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-12
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100

    - name: Set up compiler
      if: matrix.compiler == 'clang' && matrix.os != 'windows-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-15
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 100

    - name: Configure CMake
      run: |
        cmake -B build -S . \
          -G "${{ matrix.generator }}" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=${{ matrix.compiler == 'gcc' && 'gcc' || matrix.compiler == 'clang' && 'clang' || 'cl' }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'gcc' && 'g++' || matrix.compiler == 'clang' && 'clang++' || 'cl' }} \
          -DCMAKE_CXX_STANDARD=17 \
          -DBUILD_TESTING=ON

    - name: Build
      run: |
        cmake --build build --config Release --parallel 2

    - name: Run Tests
      run: |
        ctest --test-dir build --output-on-failure

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}-${{ matrix.compiler }}
        path: build/
        if-no-files-found: error 